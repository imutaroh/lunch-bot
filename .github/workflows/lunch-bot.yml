name: lunch-bot

on:
  schedule:
    # 月曜 09:00 JST = 月曜 00:00 UTC
    - cron: '0 0 * * 1'
    # 火曜 09:00 JST = 火曜 00:00 UTC
    - cron: '0 0 * * 2'
  workflow_dispatch:
    inputs:
      mode:
        description: 'recruit or announce'
        required: true
        default: 'recruit'
        type: choice
        options:
          - recruit
          - announce
      env:
        description: 'Slack environment (dev = テスト用 / prod = 本番)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  run:
    runs-on: ubuntu-latest
    # schedule (定期実行) と workflow_dispatch (手動) で env の解決元が違う:
    # - schedule: inputs は空なので || の右辺 'prod' に落ちる
    # - workflow_dispatch: ユーザーが選んだ inputs.env が使われる
    environment: ${{ inputs.env || 'prod' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 0 * * 1" ]; then
            echo "mode=recruit" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 0 * * 2" ]; then
            echo "mode=announce" >> "$GITHUB_OUTPUT"
          else
            echo "Unknown trigger: event=${{ github.event_name }} schedule=${{ github.event.schedule }}"
            exit 1
          fi

      - name: Run lunch-bot
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: go run ./cmd/bot ${{ steps.mode.outputs.mode }}
